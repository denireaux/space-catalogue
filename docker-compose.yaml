services:

  # PostresSQL
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  # FastAPI
  api:
      build:
        context: .
        dockerfile: docker/api.Dockerfile
      ports:
        - "8000:8000"
      depends_on:
        - db

  # Keep Alive
  heartbeat:
    build:
      context: .
      dockerfile: docker/heartbeat.Dockerfile
    env_file: .env
    depends_on:
      - api
