services:

  # PostresSQL
  db:
    container_name: db
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - ./db_scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./data/space-track/omm_data.csv:/tmp/omm_data.csv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgresSQL Admin Portal
  pgadmin:
    container_name: pg-admin
    image: dpage/pgadmin4
    env_file: .env
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  # FastAPI
  api:
    container_name: api
    env_file: .env
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
